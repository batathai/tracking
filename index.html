<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bata Thailand — ติดตามสถานะ e-Tax</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #CC0000;
    --red-dark: #990000;
    --red-light: #ff1a1a;
    --off-white: #FAF9F7;
    --white: #ffffff;
    --gray: #888;
    --gray-light: #f2f2f0;
    --border: #e8e4e0;
    --text: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--off-white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--red);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0; right: 0;
    height: 4px;
    background: var(--red-dark);
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: white;
    letter-spacing: 2px;
  }

  .logo span {
    font-weight: 300;
    font-size: 13px;
    display: block;
    letter-spacing: 3px;
    opacity: 0.85;
    margin-top: -4px;
  }

  .header-tag {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ─── MAIN ─── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 2px;
    background: var(--red);
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 40px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .desc {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  /* ─── SEARCH BOX ─── */
  .search-card {
    background: var(--white);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .input-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 8px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    background: var(--off-white);
  }

  input[type="text"]::placeholder {
    font-weight: 400;
    letter-spacing: 1px;
    color: #ccc;
  }

  input[type="text"]:focus {
    border-color: var(--red);
    background: var(--white);
  }

  button {
    padding: 12px 20px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }

  button:hover { background: var(--red-dark); }
  button:active { transform: scale(0.97); }
  button:disabled { background: #ccc; cursor: not-allowed; }

  /* ─── ERROR ─── */
  .error-box {
    display: none;
    background: #fff5f5;
    border: 1px solid #fca5a5;
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--red-dark);
    font-size: 14px;
    margin-top: 12px;
  }

  /* ─── RESULT CARD ─── */
  .result-card {
    display: none;
    background: var(--white);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-top {
    background: var(--red);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ticket-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-bottom: 4px;
  }

  .ticket-no {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: white;
    letter-spacing: 2px;
  }

  .time-badge {
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    text-align: right;
    line-height: 1.6;
  }

  .result-body { padding: 1.5rem; }

  /* ─── STEPPER ─── */
  .stepper { display: flex; flex-direction: column; gap: 0; }

  .step {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    position: relative;
  }

  .step:not(:last-child)::before {
    content: '';
    position: absolute;
    left: 11px;
    top: 26px;
    width: 2px;
    height: calc(100% - 6px);
    background: var(--border);
    z-index: 0;
  }

  .step.done:not(:last-child)::before { background: var(--red); }

  .dot-wrap {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    margin-top: 1px;
  }

  .dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--off-white);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: transparent;
    transition: all 0.2s;
  }

  .step.done .dot {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

  .step.active .dot {
    background: white;
    border-color: var(--red);
    box-shadow: 0 0 0 4px rgba(204,0,0,0.1);
  }

  .step.active .dot::after {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
  }

  .step-text { padding: 2px 0 20px; }

  .step-name {
    font-size: 14px;
    font-weight: 500;
    color: #333;
    line-height: 1;
  }

  .step.pending .step-name { color: #ccc; font-weight: 400; }

  .step-sub {
    font-size: 12px;
    color: var(--gray);
    margin-top: 3px;
  }

  .active-pill {
    display: inline-block;
    background: #fff0f0;
    color: var(--red);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 5px;
    border: 1px solid rgba(204,0,0,0.2);
  }

  /* ─── FOOTER ─── */
  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 12px;
    color: #bbb;
    border-top: 0.5px solid var(--border);
  }

  footer a { color: var(--red); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="logo">
    BATA
    <span>THAILAND</span>
  </div>
  <div class="header-tag">e-Tax Support</div>
</header>

<main>
  <div class="container">

    <div class="eyebrow">ระบบติดตาม</div>
    <h1>ตรวจสอบสถานะ<br>การแจ้งปัญหา</h1>
    <p class="desc">กรอกหมายเลข Ticket ที่ได้รับหลังจากส่งแบบฟอร์ม<br>เพื่อดูความคืบหน้าการแก้ไข</p>

    <div class="search-card">
      <label class="input-label">หมายเลข Ticket</label>
      <div class="input-row">
        <input type="text" id="ticketInput" placeholder="TK-0001" maxlength="10" />
        <button id="searchBtn" onclick="checkStatus()">ค้นหา</button>
      </div>
      <div class="error-box" id="errorBox"></div>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-top">
        <div>
          <div class="ticket-label">Ticket Number</div>
          <div class="ticket-no" id="ticketNoDisplay"></div>
        </div>
        <div class="time-badge" id="timeDisplay"></div>
      </div>
      <div class="result-body">
        <div class="stepper" id="stepper"></div>
      </div>
    </div>

  </div>
</main>

<footer>
  Bata Thailand Co., Ltd. &nbsp;·&nbsp; e-Tax Support System
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwEK3vmO716BjTssLwsjZ8WLCNG8uMfigCJSwxGp_RjcbngVY-7T0h4KQ5lGrWUwVx3/exec";

const STATUS_STEPS = [
  { key: "รับเรื่องแล้ว",      sub: "ระบบได้รับข้อมูลของคุณแล้ว" },
  { key: "กำลังดำเนินการ",     sub: "ทีมงานกำลังตรวจสอบและแก้ไข" },
  { key: "รอข้อมูลเพิ่มเติม",  sub: "ทีมงานต้องการข้อมูลเพิ่มเติม" },
  { key: "แก้ไขเสร็จแล้ว",    sub: "ดำเนินการแก้ไขเสร็จสิ้น" },
  { key: "ปิดงาน",             sub: "งานเสร็จสมบูรณ์แล้ว" }
];

async function checkStatus() {
  const input = document.getElementById("ticketInput").value.trim().toUpperCase();
  const errorBox = document.getElementById("errorBox");
  const resultCard = document.getElementById("resultCard");
  const btn = document.getElementById("searchBtn");

  errorBox.style.display = "none";
  resultCard.style.display = "none";

  if (!input) {
    errorBox.textContent = "กรุณากรอกหมายเลข Ticket";
    errorBox.style.display = "block";
    return;
  }

  btn.textContent = "กำลังค้นหา...";
  btn.disabled = true;

  try {
    const res = await fetch(`${API_URL}?ticket=${encodeURIComponent(input)}`);
    const data = await res.json();

    if (data.success) {
      showResult(data);
    } else {
      errorBox.textContent = "ไม่พบหมายเลข Ticket นี้ในระบบ กรุณาตรวจสอบอีกครั้ง";
      errorBox.style.display = "block";
    }
  } catch (err) {
    errorBox.textContent = "เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง";
    errorBox.style.display = "block";
  }

  btn.textContent = "ค้นหา";
  btn.disabled = false;
}

function showResult(data) {
  document.getElementById("ticketNoDisplay").textContent = data.ticket || data.ticketNo || document.getElementById("ticketInput").value.trim().toUpperCase();

  const time = data.timestamp || "";
  const timeEl = document.getElementById("timeDisplay");
  timeEl.innerHTML = time ? `ส่งเรื่องเมื่อ<br>${time}` : "";

  const currentIndex = STATUS_STEPS.findIndex(s => s.key === data.status);
  const stepper = document.getElementById("stepper");
  stepper.innerHTML = "";

  STATUS_STEPS.forEach((step, i) => {
    const done   = i < currentIndex;
    const active = i === currentIndex;
    const cls    = done ? "done" : active ? "active" : "pending";

    const div = document.createElement("div");
    div.className = `step ${cls}`;
    div.innerHTML = `
      <div class="dot-wrap">
        <div class="dot">${done ? "✓" : ""}</div>
      </div>
      <div class="step-text">
        <div class="step-name">${step.key}</div>
        ${active ? `<div class="step-sub">${step.sub}</div><span class="active-pill">สถานะปัจจุบัน</span>` : ""}
      </div>`;
    stepper.appendChild(div);
  });

  document.getElementById("resultCard").style.display = "block";
}

document.getElementById("ticketInput").addEventListener("keypress", e => {
  if (e.key === "Enter") checkStatus();
});
</script>
</body>
</html>
